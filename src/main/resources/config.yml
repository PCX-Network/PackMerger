# =============================================================================
# PackMerger Configuration
# =============================================================================
# This file controls all aspects of the PackMerger plugin: how packs are merged,
# where the merged result is uploaded, and how it's distributed to players.
#
# After making changes, run /packmerger reload to apply them.
# =============================================================================

# =============================================================================
# Server Identity
# =============================================================================

# The name of this server, used to look up per-server pack configurations below.
# If left empty (default), the plugin reads the "server-name" property from
# server.properties automatically. This is useful for multi-server networks
# where each backend server needs a slightly different merged pack.
#
# Valid values: any string, or "" for auto-detection
# Default: "" (auto-detect from server.properties)
server-name: ""

# =============================================================================
# Pack Priority
# =============================================================================

# Ordered list of resource pack filenames that determines merge precedence.
# The first entry has the HIGHEST priority — its files win when two packs contain
# the same non-mergeable file (e.g. the same texture path).
#
# Use the exact filename including the .zip extension for zip packs, or the folder
# name for unzipped packs placed directly in the packs/ directory.
#
# Packs found in the packs/ folder but not listed here will still be merged, but
# at the lowest priority with a console warning. Add them here to control ordering.
priority:
  - "main-pack.zip"
  - "ui-overhaul.zip"
  - "custom-models.zip"

# =============================================================================
# Remote Pack Sources (optional)
# =============================================================================

# Remote packs are downloaded from a URL into packs/.remote-cache/<alias>.zip
# and appear in the merge pipeline under their alias. Reference them in
# priority: by alias (without .zip) — e.g. "- quality-armory" for a remote
# pack declared as remote-packs: { quality-armory: ... }.
#
# Refresh policy controls when the plugin re-downloads a pack:
#   "on-startup" — fetch when the plugin enables
#   "on-reload"  — fetch on startup AND on /pm reload
#   "manual"     — only fetch on /pm fetch <alias>
#
# HTTP caching (ETag / Last-Modified) is honored automatically; unchanged
# origins return 304 and the cached copy is reused.
#
# If a fetch fails but a cached copy exists, the cached copy is used and a
# warning is logged. If both fail, the pack is skipped with an error.
#
# SECURITY: PackMerger does not validate the pack's contents beyond normal
# merge validation. You're trusting whatever is at the URL. Pin to a
# specific release tag or checksum in the URL when possible.
#
# Environment-variable substitution is supported in url / auth fields —
# write "${VAR_NAME}" to pull from the server process's environment rather
# than committing secrets to config.yml.
#
# Default: remote-packs: {} (feature not in use)
remote-packs:
#  quality-armory:
#    url: "https://github.com/user/repo/releases/latest/download/pack.zip"
#    refresh: "on-startup"
#    # auth block is optional
#    auth:
#      type: "bearer"                 # "none", "bearer", or "basic"
#      token: "${GITHUB_TOKEN}"       # env-var substitution
#  internal-ui:
#    url: "https://artifacts.internal.example.com/packs/ui-latest.zip"
#    refresh: "on-reload"
#    allow-http: false                # set true only for internal stores
#    auth:
#      type: "basic"
#      username: "${ARTIFACT_USER}"
#      password: "${ARTIFACT_PW}"

# =============================================================================
# Profiles (optional)
# =============================================================================

# Profiles let you switch entire pack compositions atomically via
# /pm profile switch <name> — useful for seasonal events (halloween, anniversary)
# or A/B testing different pack loadouts.
#
# When active-profile names a defined profile, its priority + server-packs
# shadow the root-level keys above. When active-profile is empty or the
# profiles section is absent, PackMerger uses the root-level keys as before.
# This is fully backwards-compatible with 1.0.x configs.
#
# Default: profiles: {} (not in use; root-level priority/server-packs apply)
active-profile: ""
profiles:
#  default:
#    priority:
#      - "main-pack.zip"
#      - "ui-overhaul.zip"
#    server-packs: {}
#  halloween:
#    priority:
#      - "halloween-overlay.zip"
#      - "main-pack.zip"
#      - "ui-overhaul.zip"
#    server-packs:
#      survival:
#        additional:
#          - "halloween-survival.zip"
#        exclude: []

# =============================================================================
# Per-Server Pack Configuration
# =============================================================================

# Allows each server in a network to include additional packs or exclude certain
# packs from the global priority list. The server is matched by the "server-name"
# value above (case-insensitive).
#
# "additional" packs are merged at LOWER priority than the global priority list.
# "exclude" packs are skipped entirely for that server.
#
# Only useful for multi-server setups. Leave commented out for single servers.
server-packs:
#  blazebornsmp:
#    # Extra packs to include for this server only (merged at lowest priority)
#    additional:
#      - "blazeborn-textures.zip"
#    # Packs from the global priority list to skip on this server
#    exclude: []
#  cobaltsmp:
#    additional:
#      - "cobalt-textures.zip"
#    exclude:
#      - "ui-pack.zip"

# =============================================================================
# Merge Settings
# =============================================================================

merge:
  # Whether to automatically run the merge pipeline on server startup.
  # If false, you must manually run /packmerger reload to trigger the first merge.
  #
  # Valid values: true, false
  # Default: true
  auto-merge-on-startup: true

  # ---- Optimization ----
  optimization:
    # Remove junk and OS metadata files from the merged pack output.
    # Strips files like .DS_Store, Thumbs.db, desktop.ini, .gitignore, and
    # anything inside __MACOSX or .git directories.
    #
    # Valid values: true, false
    # Default: true (recommended — these files waste space and serve no purpose)
    strip-junk-files: true

    # ZIP compression level for the merged output file.
    #   0 = no compression (fastest build, largest file)
    #   1-3 = light compression (fast)
    #   4-6 = balanced (recommended)
    #   7-9 = maximum compression (slowest build, smallest file)
    #
    # Higher compression reduces download size for players but increases merge time.
    #
    # Valid values: 0-9
    # Default: 6 (good balance of size and speed)
    compression-level: 6

    # Log a console warning if the merged pack exceeds this size in megabytes.
    # Large packs (100+ MB) may cause download timeouts for players on slow connections.
    # Set to 0 to disable the warning.
    #
    # Valid values: 0 (disabled) or any positive integer
    # Default: 100
    size-warning-mb: 100

  # ---- Hot Reload ----
  hot-reload:
    # Watch the packs/ folder for file changes and automatically re-merge.
    # When enabled, adding, modifying, or removing a pack file triggers a new merge
    # after the debounce period. Useful during development when iterating on packs.
    #
    # Valid values: true, false
    # Default: true
    enabled: true

    # How many seconds to wait after the LAST file change before triggering a merge.
    # This debounce prevents excessive re-merges when copying multiple files at once
    # (e.g. extracting a new pack zip). The timer resets with each new file event.
    #
    # Valid values: any positive integer (recommended: 3-10)
    # Default: 5
    debounce-seconds: 5

# =============================================================================
# Upload Settings
# =============================================================================

upload:
  # Whether to automatically upload the merged pack after every merge.
  # If false, the merged pack is written to disk but not uploaded or served.
  # You would need to manually distribute the file from the output/ folder.
  #
  # Valid values: true, false
  # Default: true
  auto-upload: true

  # Which upload provider to use for serving the merged pack to players.
  #
  # Valid values:
  #   "polymath"  — self-hosted Polymath server instance
  #   "self-host" — built-in HTTP server (simplest, no external service needed)
  #   "s3"        — any S3-compatible object store: AWS S3, Cloudflare R2, Backblaze B2
  #
  # Default: "self-host"
  provider: "self-host"

  # ---- Polymath Configuration ----
  # Only used when provider is "polymath". Uploads to a Polymath server.
  # Polymath is a lightweight Python web server for hosting resource packs.
  # GitHub: https://github.com/oraxen/polymath
  #
  # NOTE: The public Oraxen instance (atlas.oraxen.com) has been shut down.
  # You must self-host your own Polymath instance to use this provider.
  polymath:
    # Polymath server URL (no trailing slash).
    # Example: http://localhost:5000
    #
    # Default: ""
    server: ""

    # Shared secret for upload authentication.
    # Must match the secret configured on the Polymath server.
    #
    # Default: ""
    secret: ""

    # Unique ID for this server's pack (used to overwrite previous uploads).
    # Each upload with the same ID replaces the previous pack for that ID.
    # If left empty, uses the server name from config or server.properties.
    #
    # Default: "" (use server name)
    id: ""

  # ---- Self-Host Configuration ----
  # Only used when provider is "self-host". Runs a built-in HTTP server.
  self-host:
    # The port for the built-in HTTP server to listen on.
    # Make sure this port is open in your firewall and not used by another service.
    # Players will download from: http://<your-server-ip>:<port>/pack
    #
    # Default: 8080
    port: 8080

    # The public-facing URL that players use to download the pack.
    # If left empty, the plugin auto-constructs it using the server-ip from
    # server.properties and the port above (e.g. http://1.2.3.4:8080/pack).
    #
    # Set this explicitly if your server is behind a reverse proxy, NAT, or
    # if the auto-detected IP is incorrect (e.g. shows "localhost").
    #
    # Default: "" (auto-detect)
    public-url: ""

    # Maximum number of concurrent pack downloads allowed at the same time.
    # When the limit is reached, additional download requests get a 429 (Too Many
    # Requests) response until a slot opens up. This prevents the server from being
    # overwhelmed during mass player joins.
    #
    # Set to 0 for unlimited concurrent downloads (not recommended for large servers).
    #
    # Valid values: 0 (unlimited) or any positive integer
    # Default: 50
    rate-limit: 50

  # ---- S3 / R2 / Backblaze B2 Configuration ----
  # Only used when provider is "s3". Uploads the merged pack to any S3-compatible
  # object store. One config works for AWS S3, Cloudflare R2, and Backblaze B2 —
  # only the endpoint URL differs.
  #
  # Credentials support ${VAR_NAME} env substitution so secrets don't live in
  # config.yml. Commit env vars via your process manager / systemd unit.
  s3:
    # S3 API endpoint. Examples:
    #   AWS:       "https://s3.us-east-1.amazonaws.com"
    #   R2:        "https://<account-id>.r2.cloudflarestorage.com"
    #   Backblaze: "https://s3.us-west-004.backblazeb2.com"
    endpoint: ""

    # SigV4 region. R2 accepts "auto". AWS uses the canonical region name.
    # Backblaze uses the region shown in your bucket's endpoint URL.
    region: "us-east-1"

    # Target bucket. Must already exist and be writable by the access key below.
    bucket: ""

    # Credentials. Prefer env-var substitution:
    access-key: "${S3_ACCESS_KEY}"
    secret-key: "${S3_SECRET_KEY}"

    # Optional: prefix every object key with this (no leading slash).
    # Example: "packs/" produces objects like "packs/<sha1>.zip".
    path-prefix: ""

    # CDN base URL served in front of the bucket. If set, the returned pack URL
    # is "<public-url-base>/<key>" — so you'd set this to your CDN/Worker host.
    # Leave empty to fall back to "<endpoint>/<bucket>/<key>" which works for
    # public buckets on R2 and Backblaze out of the box.
    public-url-base: ""

    # ACL applied to uploaded objects.
    #   "public-read" — anyone with the URL can download (default)
    #   "private"     — returns a short-lived presigned URL instead
    acl: "public-read"

    # Cache-Control header attached to uploads. Long TTL is fine when
    # key-strategy is content-addressed (each merge gets a new URL).
    cache-control: "public, max-age=3600"

    # How object keys are chosen:
    #   "content-addressed" — "<prefix><sha1>.zip". Each merge writes a new key,
    #                         so clients that have cached the previous URL keep
    #                         their copy until a hash change forces a re-download.
    #                         Recommended for correctness. Use retention to bound
    #                         storage.
    #   "stable"            — "<prefix><server-name>.zip". Every merge overwrites
    #                         the same object. Simpler, but breaks client HTTP
    #                         caching since the URL never changes.
    #
    # Default: "content-addressed"
    key-strategy: "content-addressed"

    # When acl is "private", URLs are presigned with this lifetime.
    # Ignored when acl is "public-read".
    presign-duration-hours: 24

    # Retention policy for content-addressed keys. After each successful upload,
    # list objects under <path-prefix> and delete anything beyond the latest N.
    # Set to 0 to disable (unbounded growth).
    retention:
      keep-latest: 5

# =============================================================================
# Distribution Settings
# =============================================================================

distribution:
  # Whether to automatically send the resource pack to players when they join.
  # If false, the pack is merged and uploaded but never sent to players automatically.
  # You can still use /packmerger apply to send it manually.
  #
  # Valid values: true, false
  # Default: true
  enabled: true

  # Whether the resource pack is required. If true, players who decline the pack
  # will be kicked from the server. The kick message is controlled by Minecraft.
  #
  # Valid values: true, false
  # Default: false
  required: false

  # Custom prompt message shown to players when they receive the resource pack request.
  # Uses MiniMessage formatting (https://docs.advntr.dev/minimessage/format.html).
  # Leave empty to use Minecraft's default prompt.
  #
  # Example: "<yellow>Please accept our resource pack for the best experience!</yellow>"
  #
  # Default: "" (Minecraft default)
  prompt-message: ""

  # Controls how the pack is applied to the player's client:
  #   false — replaces all existing resource packs (clearResourcePacks + sendResourcePacks)
  #   true  — adds this pack alongside any existing packs (sendResourcePacks only)
  #
  # Use "true" if players may have other server resource packs loaded simultaneously
  # (e.g. in a network with multiple pack sources). Requires Minecraft 1.20.3+.
  #
  # Valid values: true, false
  # Default: false (replace existing packs)
  use-add-resource-pack: false

  # Delay in server ticks (1 tick = 50ms) before sending the pack after a player joins.
  # A short delay gives the client time to finish loading the world before receiving
  # the pack prompt. Too short may cause the prompt to appear before the player can
  # interact; too long feels sluggish.
  #
  # Valid values: any non-negative integer (recommended: 10-40)
  # Default: 20 (1 second)
  join-delay-ticks: 20

  # ---- Player Cache ----
  cache:
    # Track which resource pack version each player has downloaded.
    # When enabled, players who rejoin with the same pack version skip the download
    # entirely, reducing bandwidth and improving join speed. The cache is stored in
    # plugins/PackMerger/cache/player-cache.json and persisted every 5 minutes.
    #
    # Disable this if you want every player to re-download the pack on every join
    # (not recommended for production).
    #
    # Valid values: true, false
    # Default: true
    enabled: true

  # ---- New Pack Behavior ----
  on-new-pack:
    # What to do when a new merged pack is produced while players are already online
    # (e.g. after a hot-reload or manual /packmerger reload).
    #
    # Valid values:
    #   "none"   — do nothing; players get the new pack on next join
    #   "notify" — send a chat message to players with the packmerger.notify permission
    #   "resend" — immediately send the new pack to all online players (may interrupt gameplay)
    #
    # Default: "notify"
    action: "notify"

    # The chat message sent to online players when action is "notify".
    # Uses MiniMessage formatting. Only sent to players with the packmerger.notify
    # permission (default: all players).
    #
    # Default: (see below)
    notify-message: "<yellow>[PackMerger]</yellow> <gray>A new resource pack is available. Rejoin or use F3+T to reload.</gray>"

# =============================================================================
# Validation
# =============================================================================

validation:
  # How to treat pack_format mismatches between the merged pack's pack.mcmeta
  # and the running server's Minecraft version. Mismatches silently break
  # rendering in-game (missing models, missing textures), so surfacing them at
  # merge time is usually what you want.
  #
  # Valid values:
  #   "warn"  — log a WARNING but allow the merge (default)
  #   "error" — log an ERROR (counts toward validation errors, and — once
  #             validation rollback is enabled in 1.1.0 — prevents shipping the
  #             broken pack)
  #   "off"   — skip the check entirely
  #
  # The registry of MC version → expected pack_format is maintained inside the
  # plugin (PackFormatRegistry). If you're on a brand-new MC release that hasn't
  # been added yet, the check silently skips so you don't get noise.
  #
  # Default: "warn"
  pack-format-check: "warn"

  # When a merge produces a pack that fails validation (errors, not warnings),
  # rollback keeps the previous merged pack live so players continue seeing a
  # working version instead of a broken one. The failed attempt is discarded
  # and a PackValidationFailedEvent fires so other plugins can page someone.
  #
  # Only kicks in when a previous output actually exists — on the very first
  # merge with a broken pack, there is nothing to roll back to and we ship
  # the broken pack anyway (with a loud error log).
  #
  # Valid values: true, false
  # Default: true
  rollback-on-errors: true

  # Whether non-critical warnings (missing textures, invalid JSON in non-
  # critical files) should also trigger rollback. Most operators want only
  # hard errors to block a ship, so warnings-only packs still go out.
  #
  # Valid values: true, false
  # Default: false
  fail-on-warnings: false

  # Scan the merged pack for textures and sounds that no JSON file references.
  # Unreferenced assets ship to every player download for nothing, so surfacing
  # them lets you trim bloated packs. Reported as warnings — never errors —
  # and the scan runs after every merge.
  #
  # Note: atlas sources of type "filter" (regex-based) aren't expanded, so
  # packs that rely on them may see false-positive orphan warnings for matched
  # textures. Disable this check if that's noisy for your pack set.
  #
  # Valid values: true, false
  # Default: true
  detect-orphans: true

  # How many of the largest orphan assets to list in the validation summary.
  # The full list is written to output/last-merge-report.txt via /pm inspect
  # export if you need the complete picture.
  #
  # Valid values: any positive integer
  # Default: 20
  orphan-report-limit: 20

# =============================================================================
# Logging
# =============================================================================

# Minimum log level. Controls how verbose console output is.
# Messages at this level and above are shown; messages below are hidden.
#
# Valid values:
#   "debug"   — show everything (verbose, useful for troubleshooting)
#   "info"    — normal operation (default)
#   "warning" — only warnings and errors
#   "error"   — only errors
#
# Default: "info"
log-level: "info"
